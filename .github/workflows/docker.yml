name: Docker

on:
  workflow_call:
    inputs:
      app-version:
        description: App Version
        required: false
        type: string
      build-args:
        description: Docker build args that will be passed to `build-args` input in `docker/build-push-action`
        required: false
        type: string
      docker-file:
        description: Docker file path
        required: true
        type: string
      image-name:
        description: Docker image name
        required: false
        type: string
        default: ${{ github.repository }}
      image-tag:
        description: Docker image tag
        required: true
        type: string
      ref:
        description: The branch, tag or SHA that will be passed to `ref` input in `actions/checkout`
        required: false
        type: string
      image-labels:
        description: Docker image labels that will be passed to `labels` input in `docker/metadata-action`
        required: false
        type: string
        default: |
          org.opencontainers.image.vendor=${{ github.repository_owner }}
      registry:
        description: "Docker registry that will be passed to `docker/login-action`, default: 'ghcr.io'"
        required: false
        default: ghcr.io
        type: string
      username:
        description: "Registry credential username that will be passed to `docker/login-action`, default: `github.actor`"
        required: false
        default: ${{ github.actor }}
        type: string
      password:
        description: "Registry credential password that will be passed to `docker/login-action`, default: `github.token`"
        required: false
        default: ${{ github.token }}
        type: string

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Normalize image name
        id: image-name
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
        run: |
          # Extract repository name and convert to lowercase
          echo "lowercase=$(echo $IMAGE_NAME | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.username }}
          password: ${{ inputs.password }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ inputs.registry }}/${{ steps.image-name.outputs.lowercase }}
          labels: ${{ inputs.image-labels }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.image-tag }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,format=long

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          build-args: ${{ inputs.build-args }}
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: ${{ inputs.docker-file }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          push: true

      - uses: actions/attest-build-provenance@v4
        if: ${{ github.event_name == 'push' }}
        with:
          subject-name: ${{ inputs.registry }}/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}

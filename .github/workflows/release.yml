name: Release

on:
  workflow_call:
    inputs:
      files:
        description: Multiline list of files or wildcards to upload
        required: false
        type: string
        default: ''

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: lts/*

    - name: Release Changelog
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: npx changelogithub

    - name: Upload Release Assets
      if: ${{ inputs.files != '' }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
        FILES: ${{ inputs.files }}
      run: |
        shopt -s nullglob
        for f in $FILES; do
          if [ -f "$f" ]; then
            echo "::group::Uploading $f..."
            gh release upload "$GITHUB_REF_NAME" "$f" --clobber
            echo '::endgroup::'
          else
            echo "Skipping missing file: $f"
          fi
        done

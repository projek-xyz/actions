name: Release

on:
  workflow_call:
    inputs:
      files:
        description: Multiline list of files or wildcards to upload
        required: false
        type: string
        default: ''

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: lts/*

    - name: Release Changelog
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: npx changelogithub

    - name: Upload Release Assets
      if: ${{ inputs.files != '' }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
        FILES: ${{ inputs.files }}
      run: |
        mapfile -t patterns <<< "$FILES"

        shopt -s nullglob

        for pattern in "${patterns[@]}"; do
          p=$(echo "$pattern" | xargs)

          [ -z "$p" ] && continue

          (
            IFS=''
            files=($p)
            if [ ${#files[@]} -eq 0 ]; then
              echo "No files matched pattern: $p"
            else
              echo "::group::Uploading matches for $p..."
              gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
              echo '::endgroup::'
            fi
          )
        done
